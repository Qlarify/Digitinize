<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1128 191" width="1128" height="191" role="img" aria-label="Digitinize Creative — Embedded Revenue Marketing Agency">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050C1C"/>
      <stop offset="55%" stop-color="#091528"/>
      <stop offset="100%" stop-color="#060F0F"/>
    </linearGradient>
    <radialGradient id="glowTeal2" cx="82%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#13BABA" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0D8080" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowIndigo2" cx="8%" cy="92%" r="35%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="headlineGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#13BABA"/>
      <stop offset="100%" stop-color="#B8F0F0"/>
    </linearGradient>
    <pattern id="dotgrid2" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#FFFFFF" fill-opacity="0.07"/>
    </pattern>
    <style>
      .display { font-family: 'Fraunces', 'Times New Roman', Georgia, serif; font-weight: 900; letter-spacing: -2px; }
      .display-em { font-family: 'Fraunces', 'Times New Roman', Georgia, serif; font-weight: 700; font-style: italic; letter-spacing: -1.5px; }
      .body { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; font-weight: 500; letter-spacing: 1px; }
    </style>
  </defs>

  <rect width="1128" height="191" fill="url(#bg2)"/>
  <rect width="1128" height="191" fill="url(#dotgrid2)"/>
  <rect width="1128" height="191" fill="url(#glowTeal2)"/>
  <rect width="1128" height="191" fill="url(#glowIndigo2)"/>

  <!-- Eyebrow pill -->
  <g transform="translate(56,32)">
    <rect width="156" height="26" rx="13" fill="#0D8080" fill-opacity="0.14" stroke="#13BABA" stroke-opacity="0.32"/>
    <circle cx="14" cy="13" r="3" fill="#13BABA"/>
    <text x="26" y="17" class="mono" font-size="10" fill="#13BABA">REVENUE MARKETING</text>
  </g>

  <!-- Logo wordmark -->
  <g transform="translate(56,100)">
    <text x="0" y="0" class="display" font-size="48">
      <tspan fill="#F4F9F9">Digitinize</tspan><tspan fill="#13BABA"> Creative.</tspan>
    </text>
  </g>

  <!-- Tagline -->
  <g transform="translate(56,130)">
    <text x="0" y="0" class="display-em" font-size="22" fill="url(#headlineGrad2)">Your growth partner.</text>
    <text x="0" y="22" class="body" font-size="13" fill="rgba(220,235,235,0.65)">Embedded in your team. Accountable to your pipeline.</text>
  </g>

  <!-- Right side mini chart -->
  <g transform="translate(820,42)">
    <rect width="248" height="108" rx="10" fill="#0B132A" fill-opacity="0.55" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <text x="16" y="24" class="body" font-size="11" fill="#F0EEF8" font-weight="600">Pipeline · Compounding</text>
    <text x="16" y="38" class="mono" font-size="8" fill="rgba(220,235,235,0.4)">B2B · B2C · MONTH 12</text>

    <!-- mini chart -->
    <g transform="translate(16,50)">
      <line x1="0" y1="0" x2="216" y2="0" stroke="rgba(255,255,255,0.04)"/>
      <line x1="0" y1="14" x2="216" y2="14" stroke="rgba(255,255,255,0.04)"/>
      <line x1="0" y1="28" x2="216" y2="28" stroke="rgba(255,255,255,0.04)"/>
      <line x1="0" y1="42" x2="216" y2="42" stroke="rgba(255,255,255,0.04)"/>
      <path d="M 0,42 C 40,38 80,30 120,20 C 160,11 200,5 216,2 L 216,50 L 0,50 Z" fill="#13BABA" fill-opacity="0.18"/>
      <path d="M 0,42 C 40,38 80,30 120,20 C 160,11 200,5 216,2" fill="none" stroke="#13BABA" stroke-width="2" stroke-linecap="round"/>
      <circle cx="216" cy="2" r="3" fill="#13BABA"/>
      <circle cx="216" cy="2" r="6" fill="#13BABA" fill-opacity="0.3"/>
    </g>
  </g>

  <!-- Bottom strip -->
  <g transform="translate(56,170)">
    <text x="0" y="0" class="mono" font-size="9" fill="rgba(220,235,235,0.42)">
      <tspan>FOUNDED 2014</tspan>
      <tspan dx="10" fill="rgba(220,235,235,0.22)">·</tspan>
      <tspan dx="10">BANGALORE, INDIA</tspan>
      <tspan dx="10" fill="rgba(220,235,235,0.22)">·</tspan>
      <tspan dx="10">DIGITINIZE.COM</tspan>
    </text>
  </g>
</svg>
