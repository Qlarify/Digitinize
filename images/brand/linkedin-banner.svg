<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396" role="img" aria-label="Digitinize Creative — Your growth partner. Embedded in your team. Accountable to your pipeline.">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050C1C"/>
      <stop offset="55%" stop-color="#091528"/>
      <stop offset="100%" stop-color="#060F0F"/>
    </linearGradient>
    <radialGradient id="glowTeal" cx="78%" cy="22%" r="40%">
      <stop offset="0%" stop-color="#13BABA" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#0D8080" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0D8080" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowIndigo" cx="6%" cy="88%" r="40%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.32"/>
      <stop offset="60%" stop-color="#4F46E5" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="headlineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#13BABA"/>
      <stop offset="50%" stop-color="#81E0E0"/>
      <stop offset="100%" stop-color="#B8F0F0"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D8080"/>
      <stop offset="100%" stop-color="#13BABA"/>
    </linearGradient>
    <linearGradient id="chartArea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#13BABA" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#13BABA" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dotgrid" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#FFFFFF" fill-opacity="0.08"/>
    </pattern>
    <style>
      .display { font-family: 'Fraunces', 'Times New Roman', Georgia, serif; font-weight: 900; letter-spacing: -3px; }
      .display-em { font-family: 'Fraunces', 'Times New Roman', Georgia, serif; font-weight: 700; font-style: italic; letter-spacing: -2.5px; }
      .body { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; }
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; font-weight: 500; letter-spacing: 1px; }
      .ink-light { fill: #F4F9F9; }
      .ink-muted { fill: rgba(220,235,235,0.55); }
      .ink-faint { fill: rgba(220,235,235,0.35); }
      .teal { fill: #13BABA; }
    </style>
  </defs>

  <!-- Background layers -->
  <rect width="1584" height="396" fill="url(#bg)"/>
  <rect width="1584" height="396" fill="url(#dotgrid)"/>
  <rect width="1584" height="396" fill="url(#glowTeal)"/>
  <rect width="1584" height="396" fill="url(#glowIndigo)"/>

  <!-- Eyebrow pill -->
  <g transform="translate(80,72)">
    <rect width="172" height="32" rx="16" fill="#0D8080" fill-opacity="0.14" stroke="#13BABA" stroke-opacity="0.32" stroke-width="1"/>
    <circle cx="16" cy="16" r="3.5" fill="#13BABA"/>
    <text x="30" y="21" class="mono" font-size="11" fill="#13BABA">REVENUE MARKETING</text>
  </g>

  <!-- Logo wordmark -->
  <g transform="translate(80,180)">
    <text x="0" y="0" class="display" font-size="92" class-name="logo-main">
      <tspan fill="#F4F9F9">Digitinize</tspan><tspan fill="#13BABA"> Creative.</tspan>
    </text>
  </g>

  <!-- Tagline -->
  <g transform="translate(80,236)">
    <text x="0" y="0" class="display-em" font-size="40" fill="url(#headlineGrad)">Your growth partner.</text>
    <text x="0" y="42" class="body" font-size="18" fill="rgba(220,235,235,0.72)">Embedded in your team. Accountable to your pipeline.</text>
  </g>

  <!-- Bottom-left tagline strip -->
  <g transform="translate(80,348)">
    <text x="0" y="0" class="mono" font-size="11" fill="rgba(220,235,235,0.45)">
      <tspan>FOUNDED 2014</tspan>
      <tspan dx="12" fill="rgba(220,235,235,0.25)">·</tspan>
      <tspan dx="12">BANGALORE, INDIA</tspan>
      <tspan dx="12" fill="rgba(220,235,235,0.25)">·</tspan>
      <tspan dx="12">EMBEDDED B2B + B2C MARKETING</tspan>
    </text>
  </g>

  <!-- Right side: minimalist pipeline dashboard mock -->
  <g transform="translate(1080,72)">
    <!-- Card frame -->
    <rect width="424" height="252" rx="14" fill="#0B132A" fill-opacity="0.62" stroke="#FFFFFF" stroke-opacity="0.08"/>

    <!-- Card header -->
    <text x="22" y="34" class="body" font-size="13" fill="#F0EEF8" font-weight="600">Pipeline Dashboard</text>
    <text x="22" y="50" class="mono" font-size="9" fill="rgba(220,235,235,0.4)">ILLUSTRATIVE · COMPOUNDING REVENUE</text>

    <!-- KPI tiles -->
    <g transform="translate(22,68)">
      <rect width="86" height="56" rx="8" fill="#172050" fill-opacity="0.55" stroke="rgba(255,255,255,0.06)"/>
      <text x="12" y="22" class="mono" font-size="9" fill="rgba(220,235,235,0.5)">PIPELINE</text>
      <text x="12" y="44" class="display" font-size="22" fill="#13BABA" letter-spacing="0">↗</text>

      <rect x="96" y="0" width="86" height="56" rx="8" fill="#172050" fill-opacity="0.55" stroke="rgba(255,255,255,0.06)"/>
      <text x="108" y="22" class="mono" font-size="9" fill="rgba(220,235,235,0.5)">MQL→SQL</text>
      <text x="108" y="44" class="display" font-size="22" fill="#22C55E" letter-spacing="0">↗</text>

      <rect x="192" y="0" width="86" height="56" rx="8" fill="#172050" fill-opacity="0.55" stroke="rgba(255,255,255,0.06)"/>
      <text x="204" y="22" class="mono" font-size="9" fill="rgba(220,235,235,0.5)">AVG. ACV</text>
      <text x="204" y="44" class="display" font-size="22" fill="#4F46E5" letter-spacing="0">↗</text>

      <rect x="288" y="0" width="92" height="56" rx="8" fill="#172050" fill-opacity="0.55" stroke="rgba(255,255,255,0.06)"/>
      <text x="300" y="22" class="mono" font-size="9" fill="rgba(220,235,235,0.5)">CLIENTS</text>
      <text x="300" y="44" class="body" font-size="16" fill="#F0EEF8" font-weight="700">B2B·B2C</text>
    </g>

    <!-- Chart -->
    <g transform="translate(22,150)">
      <!-- Grid lines -->
      <line x1="0" y1="0" x2="380" y2="0" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
      <line x1="0" y1="24" x2="380" y2="24" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
      <line x1="0" y1="48" x2="380" y2="48" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
      <line x1="0" y1="72" x2="380" y2="72" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

      <!-- Area -->
      <path d="M 0,72 C 70,68 130,55 200,38 C 270,22 330,12 380,4 L 380,80 L 0,80 Z" fill="url(#chartArea)"/>
      <!-- Line -->
      <path d="M 0,72 C 70,68 130,55 200,38 C 270,22 330,12 380,4" fill="none" stroke="url(#chartLine)" stroke-width="2.2" stroke-linecap="round"/>

      <!-- End point -->
      <circle cx="380" cy="4" r="4" fill="#13BABA"/>
      <circle cx="380" cy="4" r="8" fill="#13BABA" fill-opacity="0.25"/>

      <!-- Month label -->
      <rect x="334" y="-18" width="50" height="16" rx="3" fill="#13BABA"/>
      <text x="359" y="-7" class="mono" font-size="9" fill="#050C1C" text-anchor="middle" font-weight="700">MONTH 12</text>
    </g>
  </g>

  <!-- URL bottom right -->
  <g transform="translate(1504,372)" text-anchor="end">
    <text x="0" y="0" class="mono" font-size="11" fill="rgba(220,235,235,0.42)">digitinize.com</text>
  </g>
</svg>
